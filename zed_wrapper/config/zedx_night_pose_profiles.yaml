# Copy/paste snippets for ZED X night pose tuning.
# This file is not loaded by zed_camera.launch.py by default.
# Copy the selected sections into zedx.yaml and common_stereo.yaml.

profiles:
  high_fps_headlights_default:
    use_when: "Headlights give enough texture; prefer low motion blur for pose."
    zedx_yaml:
      general:
        grab_resolution: 'HD1200'
        grab_frame_rate: 60
      video:
        exposure_time: 8000
        auto_exposure_time_range_min: 1000
        auto_exposure_time_range_max: 8000
        auto_analog_gain_range_min: 1000
        auto_analog_gain_range_max: 8000
        auto_digital_gain_range_min: 1
        auto_digital_gain_range_max: 8
    common_stereo_yaml:
      general:
        pub_frame_rate: 10.0
      depth:
        depth_mode: 'NEURAL_PLUS'
        depth_stabilization: 50
        depth_confidence: 90
        depth_texture_conf: 100
        publish_depth_map: false
        publish_point_cloud: false
      pos_tracking:
        pos_tracking_mode: 'AUTO'
        area_memory: false
        reset_odom_with_loop_closure: false
        depth_min_range: 0.0

  darker_60fps_more_gain:
    use_when: "Image is dark at 60 FPS, but motion blur must stay low."
    zedx_yaml:
      general:
        grab_resolution: 'HD1200'
        grab_frame_rate: 60
      video:
        exposure_time: 10000
        auto_exposure_time_range_min: 1000
        auto_exposure_time_range_max: 10000
        auto_analog_gain_range_min: 1000
        auto_analog_gain_range_max: 10000
        auto_digital_gain_range_min: 1
        auto_digital_gain_range_max: 12
    common_stereo_yaml:
      general:
        pub_frame_rate: 10.0
      depth:
        depth_confidence: 85
        depth_texture_conf: 90

  balanced_30fps_low_light:
    use_when: "60 FPS is too dark; accept more exposure while limiting blur."
    zedx_yaml:
      general:
        grab_resolution: 'HD1200'
        grab_frame_rate: 30
      video:
        exposure_time: 12000
        auto_exposure_time_range_min: 1000
        auto_exposure_time_range_max: 12000
        auto_analog_gain_range_min: 1000
        auto_analog_gain_range_max: 8000
        auto_digital_gain_range_min: 1
        auto_digital_gain_range_max: 8
    common_stereo_yaml:
      general:
        pub_frame_rate: 10.0
      depth:
        depth_confidence: 85
        depth_texture_conf: 90

  very_dark_30fps_last_resort:
    use_when: "Only if headlights/30 FPS balanced profile are still too dark."
    zedx_yaml:
      general:
        grab_resolution: 'HD1200'
        grab_frame_rate: 30
      video:
        exposure_time: 16000
        auto_exposure_time_range_min: 1000
        auto_exposure_time_range_max: 16000
        auto_analog_gain_range_min: 1000
        auto_analog_gain_range_max: 12000
        auto_digital_gain_range_min: 1
        auto_digital_gain_range_max: 16
    common_stereo_yaml:
      general:
        pub_frame_rate: 10.0
      depth:
        depth_confidence: 80
        depth_texture_conf: 85
